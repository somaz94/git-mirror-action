name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Run Go tests with coverage
        run: go test ./... -v -cover -coverprofile=coverage.out

      - name: Display coverage summary
        run: go tool cover -func=coverage.out

  build-and-push-docker:
    name: Build and Push Docker
    needs: unit-tests
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5001:5000
    env:
      TEST_TAG: localhost:5001/actions/git-mirror-action:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory ${{ github.workspace }}

      - name: Setup Docker BuildX
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host

      - name: Build the Container
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.TEST_TAG }}

      - name: 'Test: Docker dry-run succeeds with reachable URL'
        run: |
          docker run \
            --env INPUT_TARGETS="github::https://github.com/${{ github.repository }}.git" \
            --env INPUT_MIRROR_BRANCHES="all" \
            --env INPUT_DRY_RUN="true" \
            --env INPUT_DEBUG="true" \
            --rm ${{ env.TEST_TAG }}
          echo "PASS: Docker dry-run succeeded"

      - name: 'Test: Docker rejects missing targets'
        run: |
          ! docker run \
            --env INPUT_MIRROR_BRANCHES="all" \
            --rm ${{ env.TEST_TAG }}
          echo "PASS: missing targets correctly rejected"

      - name: 'Test: Docker rejects empty branches'
        run: |
          ! docker run \
            --env INPUT_TARGETS="generic::https://example.com/repo.git" \
            --env INPUT_MIRROR_BRANCHES="" \
            --rm ${{ env.TEST_TAG }}
          echo "PASS: empty branches correctly rejected"

      - name: 'Test: Docker multi-target dry-run'
        run: |
          docker run \
            --env INPUT_TARGETS="$(printf 'github::https://github.com/${{ github.repository }}.git\ngeneric::https://github.com/${{ github.repository }}.git')" \
            --env INPUT_MIRROR_BRANCHES="all" \
            --env INPUT_DRY_RUN="true" \
            --env INPUT_PARALLEL="true" \
            --env INPUT_DEBUG="true" \
            --rm ${{ env.TEST_TAG }}
          echo "PASS: multi-target parallel dry-run succeeded"

  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Build binary
        run: go build -o git-mirror-action ./cmd/main.go

      - name: 'Test: dry-run with reachable URL (exit 0)'
        run: |
          INPUT_TARGETS="github::https://github.com/${{ github.repository }}.git" \
          INPUT_MIRROR_BRANCHES="all" \
          INPUT_DRY_RUN="true" \
          INPUT_DEBUG="true" \
          ./git-mirror-action
          echo "PASS: dry-run pre-check succeeded"

      - name: 'Test: missing targets fails (exit 1)'
        run: |
          ! INPUT_MIRROR_BRANCHES="all" ./git-mirror-action
          echo "PASS: missing targets correctly rejected"

      - name: 'Test: unknown provider fails (exit 1)'
        run: |
          ! INPUT_TARGETS="invalid::https://example.com/repo.git" \
          INPUT_MIRROR_BRANCHES="all" \
          ./git-mirror-action
          echo "PASS: unknown provider correctly rejected"

      - name: 'Test: empty branches fails (exit 1)'
        run: |
          ! INPUT_TARGETS="generic::https://example.com/repo.git" \
          INPUT_MIRROR_BRANCHES="" \
          ./git-mirror-action
          echo "PASS: empty branches correctly rejected"

      - name: 'Test: dry-run with exclude branches (exit 0)'
        run: |
          INPUT_TARGETS="github::https://github.com/${{ github.repository }}.git" \
          INPUT_MIRROR_BRANCHES="all" \
          INPUT_EXCLUDE_BRANCHES="staging,hotfix" \
          INPUT_DRY_RUN="true" \
          ./git-mirror-action
          echo "PASS: dry-run with exclude branches succeeded"

      - name: 'Test: dry-run with retry config (exit 0)'
        run: |
          INPUT_TARGETS="github::https://github.com/${{ github.repository }}.git" \
          INPUT_MIRROR_BRANCHES="all" \
          INPUT_RETRY_COUNT="2" \
          INPUT_RETRY_DELAY="1" \
          INPUT_DRY_RUN="true" \
          ./git-mirror-action
          echo "PASS: dry-run with retry config succeeded"

      - name: 'Test: dry-run with specific branch (exit 0)'
        run: |
          INPUT_TARGETS="github::https://github.com/${{ github.repository }}.git" \
          INPUT_MIRROR_BRANCHES="main" \
          INPUT_DRY_RUN="true" \
          ./git-mirror-action
          echo "PASS: dry-run with specific branch succeeded"

  ci-result:
    name: CI Result
    if: always()
    needs:
      - unit-tests
      - build-and-push-docker
      - test-action
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || \
             [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "[FAIL] Some jobs failed or were cancelled"
            exit 1
          fi
          echo "[PASS] All CI jobs passed"
