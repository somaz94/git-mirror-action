name: Backup GitHub to Bitbucket

# Disabled: Bitbucket Free plan write access issue (402 error)
# Re-enable when Bitbucket plan issue is resolved
on:
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Mirror to Bitbucket
        # uses: somaz94/git-mirror-action@v1
        uses: ./
        with:
          targets: |
            bitbucket::https://bitbucket.org/somaz94/git-mirror-action.git
          bitbucket_username: ${{ secrets.BITBUCKET_USERNAME }}
          bitbucket_api_token: ${{ secrets.BITBUCKET_TOKEN }}
          mirror_branches: 'all'
          mirror_tags: 'true'
          force_push: 'true'
